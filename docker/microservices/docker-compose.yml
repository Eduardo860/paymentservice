version: "3.9"

# Docker Compose para MICROSERVICIOS ÚNICAMENTE
# Levanta: Eureka Server, API Gateway, Product/Order/Payment Services
# Pre-requisito: MongoDB y LocalStack deben estar levantados en sus redes respectivas

services:
  # ========================================
  # EUREKA SERVER - Service Discovery (8761)
  # ========================================
  eureka-server:
    build:
      context: ../../eureka-server
      dockerfile: Dockerfile
    container_name: infra-eureka-server
    ports:
      - "8761:8761"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - CLOUDWATCH_ENDPOINT=http://localstack:4566
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/eureka/apps"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # API GATEWAY (8080)
  # ========================================
  apigateway:
    build:
      context: ../../apigateway
      dockerfile: Dockerfile
    container_name: infra-apigateway
    ports:
      - "8080:8080"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - CLOUDWATCH_ENDPOINT=http://localstack:4566
    depends_on:
      eureka-server:
        condition: service_healthy
      productservice:
        condition: service_started
      orderservice:
        condition: service_started
      paymentservice:
        condition: service_started
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # PRODUCT SERVICE (8081)
  # ========================================
  productservice:
    build:
      context: ../../productservice
      dockerfile: Dockerfile
    container_name: infra-productservice
    ports:
      - "8081:8081"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - CLOUDWATCH_ENDPOINT=http://localstack:4566
      - SPRING_DATA_MONGODB_URI=mongodb://mongo-productos:27017/productos_db
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # ORDER SERVICE (8082)
  # ========================================
  orderservice:
    build:
      context: ../../orderservice
      dockerfile: Dockerfile
    container_name: infra-orderservice
    ports:
      - "8082:8082"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - CLOUDWATCH_ENDPOINT=http://localstack:4566
      - SPRING_DATA_MONGODB_URI=mongodb://mongo-ordenes:27017/ordenes_db
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # PAYMENT SERVICE (8083)
  # ========================================
  paymentservice:
    build:
      context: ../../paymentservice
      dockerfile: Dockerfile
    container_name: infra-paymentservice
    ports:
      - "8083:8083"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - CLOUDWATCH_ENDPOINT=http://localstack:4566
      - SPRING_DATA_MONGODB_URI=mongodb://mongo-pagos:27017/pagos_db
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  microservices-network:
    driver: bridge
