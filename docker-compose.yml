services:
  # ========================================
  # INFRASTRUCTURE - LocalStack (4566)
  # ========================================
  localstack:
    container_name: infra-localstack
    image: localstack/localstack:3.0.0
    ports:
      - "4566:4566"
    environment:
      - SERVICES=cloudwatch,logs,sqs
      - AWS_DEFAULT_REGION=us-east-1
      - LOCALSTACK_STRICT_MODE=0
    volumes:
      - ./docker/localstack/init-scripts.sh:/etc/localstack/init/ready.d/init-scripts.sh
    networks:
      microservices-network:
        aliases:
          - localstack
    healthcheck:
      test: ["CMD", "awslocal", "cloudwatch", "describe-alarms"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # DATABASES - PostgreSQL
  # ========================================
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres_retry_service
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mysecretpassword
      - POSTGRES_DB=failed_products_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgresql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d failed_products_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # MESSAGE BROKER - Kafka
  # ========================================
  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka-broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-init:
    image: apache/kafka:3.8.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      echo 'Creating Kafka topics...' &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 --topic payment_received_events &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 --topic inventory_update_events &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 --topic order_status_changed_events &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 --topic product_retry_jobs &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 --topic order_retry_jobs &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 --topic payments_retry_jobs &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 --topic envios_retry_jobs &&
      echo 'Topics created successfully' &&
      /opt/kafka/bin/kafka-topics.sh --list --bootstrap-server kafka:9092
      "
    networks:
      - microservices-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - microservices-network

  # ========================================
  # EMAIL SERVICE - MailHog
  # ========================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - microservices-network

  # ========================================
  # EUREKA SERVER - Service Discovery (8761)
  # ========================================
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: infra-eureka-server
    ports:
      - "8761:8761"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - CLOUDWATCH_ENDPOINT=http://localstack:4566
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/eureka/apps"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # API GATEWAY (8080)
  # ========================================
  apigateway:
    build:
      context: ./apigateway
      dockerfile: Dockerfile
    container_name: infra-apigateway
    ports:
      - "8080:8080"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - CLOUDWATCH_ENDPOINT=http://localstack:4566
    depends_on:
      eureka-server:
        condition: service_healthy
      productservice:
        condition: service_started
      orderservice:
        condition: service_started
      paymentservice:
        condition: service_started
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # PRODUCT SERVICE (8081)
  # ========================================
  productservice:
    build:
      context: ./productservice
      dockerfile: Dockerfile
    container_name: infra-productservice
    ports:
      - "8081:8081"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - CLOUDWATCH_ENDPOINT=http://localstack:4566
      - SPRING_DATA_MONGODB_URI=${MONGO_URI_PRODUCTOS}
      - SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED=false
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ORDER_SERVICE_URL=http://apigateway:8080/ordenes
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # ORDER SERVICE (8082)
  # ========================================
  orderservice:
    build:
      context: ./orderservice
      dockerfile: Dockerfile
    container_name: infra-orderservice
    ports:
      - "8082:8082"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - CLOUDWATCH_ENDPOINT=http://localstack:4566
      - SPRING_DATA_MONGODB_URI=${MONGO_URI_ORDENES}
      - SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED=false
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PRODUCT_SERVICE_URL=http://apigateway:8080/productos
      - PAYMENT_SERVICE_URL=http://apigateway:8080/pagos
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # PAYMENT SERVICE (8083)
  # ========================================
  paymentservice:
    build:
      context: ./paymentservice
      dockerfile: Dockerfile
    container_name: infra-paymentservice
    ports:
      - "8083:8083"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - CLOUDWATCH_ENDPOINT=http://localstack:4566
      - SPRING_DATA_MONGODB_URI=${MONGO_URI_PAGOS}
      - SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED=false
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ORDER_SERVICE_URL=http://apigateway:8080/ordenes
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # BROKER MESSAGE BE - Retry System (8084)
  # ========================================
  broker-message-be:
    build:
      context: ./broker-message-be
      dockerfile: Dockerfile
    container_name: infra-broker-message-be
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres_retry_service:5432/failed_products_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=mysecretpassword
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - PAYMENT_SERVICE_URL=http://apigateway:8080/pagos
      - ORDER_SERVICE_URL=http://apigateway:8080/ordenes
      - PRODUCT_SERVICE_URL=http://apigateway:8080/productos
      - NOTIFICATION_EMAIL=ep321889@gmail.com
      - NOTIFICATION_FROM=no-reply@microservices.com
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      mailhog:
        condition: service_started
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  microservices-network:
    driver: bridge

